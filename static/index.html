<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilderness Med Chat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal:      #22d3a7;
  --teal-mid:  #0d9488;
  --teal-dark: #065f46;
  --amber:     #f59e0b;
  --red:       #ef4444;
  --blue:      #60a5fa;
  --text:      #dff0e8;
  --text-soft: #6b9080;
  --text-dim:  #2e4040;
  --surface:   rgba(255,255,255,0.05);
  --border:    rgba(255,255,255,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: radial-gradient(ellipse at 50% 55%, #081510 0%, #030608 100%);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Header ──────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  flex-shrink: 0;
}

.logo {
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-soft);
}

.header-right { display: flex; align-items: center; gap: 10px; }

.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 0.74rem;
  color: var(--text-soft);
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.pill:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
.pill.active { border-color: var(--teal-mid); color: var(--teal); }

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
.status-dot.online { background: var(--teal); box-shadow: 0 0 5px var(--teal-mid); }
.status-dot.error  { background: var(--red); }

/* ── Patient Assessment panel ────────────────────────────── */
#patient-panel {
  position: fixed;
  top: 54px; right: 14px;
  width: 230px;
  background: rgba(6, 12, 10, 0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(34,211,167,0.15);
  border-radius: 14px;
  padding: 14px;
  z-index: 300;
  opacity: 0;
  transform: translateY(-8px) scale(0.97);
  pointer-events: none;
  transition: opacity .22s ease, transform .22s ease;
}
#patient-panel.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

.panel-section-title {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-dim);
  margin-bottom: 10px;
}

#panel-step {
  font-size: 0.72rem;
  font-weight: 600;
  margin-bottom: 10px;
}

.panel-field {
  display: flex;
  align-items: baseline;
  gap: 7px;
  margin-bottom: 5px;
  font-size: 0.76rem;
}
.panel-field-icon { font-size: 0.82rem; flex-shrink: 0; }
.panel-field-label { color: var(--text-dim); font-size: 0.66rem; text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0; }
.panel-field-val { margin-left: auto; text-align: right; font-size: 0.76rem; }

.panel-concerns-title {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--amber);
  margin: 8px 0 5px;
}
.panel-chip {
  display: inline-block;
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(245,158,11,.12);
  color: var(--amber);
  border: 1px solid rgba(245,158,11,.2);
  margin: 2px 2px 0 0;
}

/* ── Main layout ─────────────────────────────────────────── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 24px 0;
  gap: 28px;
  position: relative;
  min-height: 0;
}

/* ── Response text ───────────────────────────────────────── */
#text-area {
  width: 100%;
  max-width: 580px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  min-height: 80px;
}

#user-label {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-style: italic;
  transition: opacity .5s;
  text-align: center;
  opacity: 0;
  max-width: 420px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#user-label.show { opacity: 1; }

#response-text {
  font-size: clamp(1rem, 2.2vw, 1.15rem);
  line-height: 1.75;
  color: var(--text);
  text-align: center;
  overflow-y: auto;
  max-height: min(260px, 36vh);
  width: 100%;
  padding: 0 6px;
  scroll-behavior: smooth;
}
#response-text::-webkit-scrollbar { width: 3px; }
#response-text::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

/* ── Orb ─────────────────────────────────────────────────── */
#orb-wrap {
  position: relative;
  width: 240px;
  height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
}

/* Expanding rings */
.ring {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  border: 1px solid rgba(34,211,167,0.22);
}
.r1 { width: 260px; height: 260px; }
.r2 { width: 300px; height: 300px; }
.r3 { width: 340px; height: 340px; }

#orb-wrap.listening .r1 { animation: ring-out 2s ease-out infinite; }
#orb-wrap.listening .r2 { animation: ring-out 2s ease-out .65s infinite; }
#orb-wrap.listening .r3 { animation: ring-out 2s ease-out 1.3s infinite; }

#orb-wrap.speaking .r1 { animation: ring-out 2.8s ease-out infinite; }
#orb-wrap.speaking .r2 { animation: ring-out 2.8s ease-out .9s infinite; }

@keyframes ring-out {
  0%   { transform: scale(.88); opacity: .5; }
  100% { transform: scale(1.12); opacity: 0; }
}

/* Orb sphere */
#orb {
  width: 210px;
  height: 210px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  background: #040e09;
  box-shadow:
    0 0 40px rgba(34,211,167,.1),
    0 0 80px rgba(34,211,167,.05);
  transition: box-shadow .4s ease;
  will-change: transform, box-shadow;
}

/* Rotating swirl — the "lava lamp" effect */
#orb .swirl {
  position: absolute;
  width: 200%; height: 200%;
  top: -50%; left: -50%;
  border-radius: 42%;  /* oval → organic rotation */
  animation: swirl-idle 12s linear infinite;
  mix-blend-mode: screen;
  opacity: .6;
  will-change: transform;
  background: conic-gradient(
    from 0deg at 50% 50%,
    rgba(34,211,167, .90)  0deg,
    rgba(13,148,136, .65)  80deg,
    rgba(6, 95,  70, .40) 160deg,
    rgba(3,  12,   8, .15) 250deg,
    rgba(34,211,167, .90) 360deg
  );
}

/* Sphere light — gives 3D depth */
#orb .shine {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,.17) 0%, transparent 42%),
    radial-gradient(circle at 58% 62%, rgba(34,211,167,.18) 0%, transparent 38%),
    radial-gradient(circle at 50% 50%, transparent 42%, rgba(0,0,0,.55) 100%);
  pointer-events: none;
}

/* ── Orb state animations ─────────────────────────────────── */
@keyframes swirl-idle   { to { transform: rotate(360deg); } }
@keyframes swirl-fast   { to { transform: rotate(360deg); } }

/* IDLE: slow breathing */
#orb-wrap.idle #orb {
  animation: breathe 4.5s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.045); }
}

/* LISTENING: JS drives the scale/glow; swirl speeds up */
#orb-wrap.listening #orb { animation: none; }
#orb-wrap.listening .swirl { animation: swirl-fast 3.5s linear infinite; opacity: .8; }

/* PROCESSING: blue hue, pulsing scale */
#orb-wrap.processing #orb {
  animation: proc-pulse 1.6s ease-in-out infinite;
  box-shadow: 0 0 45px rgba(96,165,250,.28), 0 0 90px rgba(96,165,250,.12);
}
#orb-wrap.processing .swirl {
  animation: swirl-fast 2.5s linear infinite;
  background: conic-gradient(
    from 0deg,
    rgba(96,165,250,.85) 0deg,
    rgba(34,211,167,.55) 100deg,
    rgba(96,165,250,.35) 210deg,
    rgba(34,211,167,.6)  290deg,
    rgba(96,165,250,.85) 360deg
  );
}
@keyframes proc-pulse {
  0%, 100% { transform: scale(.97); }
  50%       { transform: scale(1.03); }
}

/* SPEAKING: amber warmth, rhythmic pulse */
#orb-wrap.speaking #orb {
  animation: speak-pulse .95s ease-in-out infinite;
  box-shadow: 0 0 50px rgba(245,158,11,.22), 0 0 100px rgba(245,158,11,.09);
}
#orb-wrap.speaking .swirl {
  animation: swirl-fast 5s linear infinite;
  background: conic-gradient(
    from 0deg,
    rgba(245,158,11,.8)  0deg,
    rgba(34,211,167,.55) 100deg,
    rgba(245,158,11,.45) 200deg,
    rgba(34,211,167,.7)  290deg,
    rgba(245,158,11,.8)  360deg
  );
}
@keyframes speak-pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.07); }
}

/* ── Status label ─────────────────────────────────────────── */
#status {
  font-size: 0.75rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--text-soft);
  text-align: center;
  transition: color .3s;
}
#orb-wrap.listening ~ #status  { color: var(--teal); }
#orb-wrap.processing ~ #status { color: var(--blue); }
#orb-wrap.speaking ~ #status   { color: var(--amber); }

/* ── Text mode ───────────────────────────────────────────── */
#text-mode-area {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  max-width: 480px;
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
  transition: opacity .25s ease, transform .25s ease;
}
#text-mode-area.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

#text-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--text);
  font-family: inherit;
  font-size: .88rem;
  padding: 10px 18px;
  outline: none;
  transition: border-color .2s;
  user-select: text;
}
#text-input:focus { border-color: rgba(34,211,167,.5); }
#text-input::placeholder { color: var(--text-dim); }

#send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(34,211,167,.15);
  border: 1px solid rgba(34,211,167,.35);
  color: var(--teal);
  cursor: pointer;
  font-size: .95rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
  flex-shrink: 0;
}
#send-btn:hover { background: rgba(34,211,167,.28); }

/* ── Footer ──────────────────────────────────────────────── */
footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px 20px 22px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Wilderness Medicine Assistant</div>
  <div class="header-right">
    <div class="pill" id="status-pill">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Connecting</span>
    </div>
    <div class="pill" id="assessment-btn">Assessment</div>
    <div class="pill active" id="audio-btn">🔊 On</div>
  </div>
</header>

<!-- Patient Assessment Panel (floating) -->
<div id="patient-panel">
  <div class="panel-section-title">Patient Assessment</div>
  <div id="panel-step" style="color: #d29922">◎ Scene Size-up</div>
  <div id="panel-fields"></div>
  <div id="panel-concerns"></div>
</div>

<!-- Main -->
<main>

  <!-- Text above orb -->
  <div id="text-area">
    <p id="user-label"></p>
    <div id="response-text"></div>
  </div>

  <!-- The orb -->
  <div id="orb-wrap" class="idle">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div id="orb">
      <div class="swirl"></div>
      <div class="shine"></div>
    </div>
  </div>

  <p id="status">Tap to speak</p>

  <!-- Text mode input -->
  <div id="text-mode-area">
    <input id="text-input" type="text" placeholder="Type your message…" autocomplete="off" spellcheck="true">
    <button id="send-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</main>

<!-- Footer -->
<footer>
  <div class="pill" id="keyboard-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="6" width="20" height="12" rx="2"/>
      <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
    </svg>
    Type
  </div>
  <div class="pill" id="reset-btn">↺ New Patient</div>
</footer>

<script>
/* ─── App state ────────────────────────────────────────────── */
let orbState   = 'idle'    // idle | listening | processing | speaking
let textMode   = false
let ttsOn      = true
let isSending  = false     // guards against duplicate concurrent sends

let mediaRecorder  = null
let audioChunks    = []
let analyserNode   = null
let vizFrameId     = null
let micAudioCtx    = null

const orbWrap      = document.getElementById('orb-wrap')
const orb          = document.getElementById('orb')
const statusEl     = document.getElementById('status')
const responseText = document.getElementById('response-text')
const userLabel    = document.getElementById('user-label')
const textModeArea = document.getElementById('text-mode-area')
const textInput    = document.getElementById('text-input')

const STATE_LABELS = {
  idle:       'Tap to speak',
  listening:  'Listening…',
  processing: 'Thinking…',
  speaking:   'Speaking…',
}

/* ─── Set orb state ────────────────────────────────────────── */
function setOrbState(s) {
  orbState = s
  orbWrap.className = s
  statusEl.textContent = STATE_LABELS[s] || s
  // Reset JS-driven overrides when leaving listening state
  if (s !== 'listening') {
    orb.style.transform  = ''
    orb.style.boxShadow  = ''
  }
}

/* ─── Health check ─────────────────────────────────────────── */
async function checkHealth() {
  try {
    const { ollama } = await fetch('/health').then(r => r.json())
    const dot = document.getElementById('status-dot')
    const txt = document.getElementById('status-text')
    dot.className = 'status-dot ' + (ollama ? 'online' : 'error')
    txt.textContent = ollama ? 'Ready' : 'Offline'
  } catch {
    document.getElementById('status-dot').className = 'status-dot error'
    document.getElementById('status-text').textContent = 'Offline'
  }
}
checkHealth()
setInterval(checkHealth, 15000)

/* ─── Patient assessment panel ─────────────────────────────── */
const FIELD_DEFS = [
  { key: 'mental_status',   icon: '🧠', label: 'Mental',
    crit: ['unresponsive'], warn: ['altered', 'confused'] },
  { key: 'airway',          icon: '🫁', label: 'Airway',
    crit: ['threatened'], ok: ['clear'] },
  { key: 'breathing',       icon: '💨', label: 'Breathing',
    crit: ['absent'], ok: ['present'] },
  { key: 'major_bleeding',  icon: '🩸', label: 'Bleeding',
    crit: ['present'], ok: ['absent'] },
  { key: 'spine_concern',   icon: '🦴', label: 'Spine',
    crit: ['yes'], warn: ['possible'] },
  { key: 'chief_complaint', icon: '🤕', label: 'Complaint', crit: [] },
  { key: 'mechanism',       icon: '⚡', label: 'MOI',        crit: [] },
]

function valColor(def, val) {
  const v = val.toLowerCase()
  if (def.crit?.some(c => v.includes(c))) return '#f85149'
  if (def.warn?.some(c => v.includes(c))) return '#d29922'
  if (def.ok?.some(c => v.includes(c)))   return '#3fb950'
  return '#7a9a8e'
}

function updateAssessmentPanel(state) {
  const step = (state.current_pas_step || '').toLowerCase()
  const stepEl = document.getElementById('panel-step')
  if (step.includes('primary')) {
    stepEl.textContent = '⚠ Primary Survey'
    stepEl.style.color = '#e07330'
  } else {
    stepEl.textContent = '◎ Scene Size-up'
    stepEl.style.color = '#d29922'
  }

  const known = FIELD_DEFS.filter(d => state[d.key])
  document.getElementById('panel-fields').innerHTML = known.map(d => `
    <div class="panel-field">
      <span class="panel-field-icon">${d.icon}</span>
      <span class="panel-field-label">${d.label}</span>
      <span class="panel-field-val" style="color:${valColor(d, state[d.key])}">${esc(state[d.key])}</span>
    </div>`).join('')

  const probs = state.active_problem_list || []
  const concEl = document.getElementById('panel-concerns')
  if (probs.length) {
    concEl.innerHTML = `<div class="panel-concerns-title">⚠ Concerns</div>` +
      probs.map(p => `<span class="panel-chip">${esc(p)}</span>`).join('')
  } else {
    concEl.innerHTML = ''
  }
}

/* ─── Send a message ───────────────────────────────────────── */
async function sendMessage(text) {
  if (!text.trim() || isSending) return
  isSending = true

  window.speechSynthesis?.cancel()

  userLabel.textContent = `"${text}"`
  userLabel.classList.add('show')
  responseText.textContent = ''
  setOrbState('processing')

  let gotDoneEvent = false

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    })

    if (!resp.ok) {
      responseText.textContent = 'Could not reach the server.'
      setOrbState('idle')
      return
    }

    const reader  = resp.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''
    let full   = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break

      buffer += decoder.decode(value, { stream: true })
      const lines = buffer.split('\n')
      buffer = lines.pop()

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue
        let ev
        try { ev = JSON.parse(line.slice(6)) } catch { continue }

        if (ev.type === 'token') {
          full += ev.content
          responseText.textContent = full
          responseText.scrollTop   = responseText.scrollHeight

        } else if (ev.type === 'done') {
          gotDoneEvent = true
          if (ev.patient_state) updateAssessmentPanel(ev.patient_state)
          ttsOn && full.trim() ? speak(full.trim()) : setOrbState('idle')

        } else if (ev.type === 'error') {
          gotDoneEvent = true
          responseText.textContent = ev.message
          setOrbState('idle')
        }
      }
    }

    // Stream closed — if the server never sent a 'done' event, reset manually
    if (!gotDoneEvent) {
      ttsOn && full.trim() ? speak(full.trim()) : setOrbState('idle')
    }

  } catch (err) {
    if (err.name !== 'AbortError') responseText.textContent = 'Connection error.'
    setOrbState('idle')
  } finally {
    isSending = false
  }
}

/* ─── Browser TTS ──────────────────────────────────────────── */
function speak(text) {
  try {
    if (!window.speechSynthesis) { setOrbState('idle'); return }
    setOrbState('speaking')

    const utt = new SpeechSynthesisUtterance(text)
    utt.rate  = 1.05
    utt.pitch = 1.0

    const voices   = window.speechSynthesis.getVoices()
    const preferred = voices.find(v =>
      /Samantha|Ava|Google US|Natural/.test(v.name)
    ) || voices.find(v => v.lang.startsWith('en')) || voices[0]
    if (preferred) utt.voice = preferred

    // Guard: only call setOrbState('idle') once
    let finished = false
    const finish = () => { if (!finished) { finished = true; setOrbState('idle') } }

    utt.onend   = finish
    utt.onerror = finish

    // Safety net: estimate duration (≈2.5 words/sec) + 8 s buffer
    // Prevents the orb from getting permanently stuck if onend never fires
    const words       = text.trim().split(/\s+/).length
    const safetyMs    = Math.max(6000, (words / 2.5) * 1000 + 8000)
    const safetyTimer = setTimeout(finish, safetyMs)

    // Clear timer early if TTS completes normally
    const origFinish = finish
    utt.onend = () => { clearTimeout(safetyTimer); origFinish() }

    window.speechSynthesis.speak(utt)
  } catch {
    setOrbState('idle')
  }
}

/* ─── Voice recording ──────────────────────────────────────── */
async function startRecording() {
  if (orbState !== 'idle') return
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })

    // Wire up the real-time amplitude visualizer
    micAudioCtx = new AudioContext()
    const src  = micAudioCtx.createMediaStreamSource(stream)
    analyserNode = micAudioCtx.createAnalyser()
    analyserNode.fftSize = 256
    src.connect(analyserNode)
    startAmplitudeViz()

    audioChunks    = []
    mediaRecorder  = new MediaRecorder(stream)
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data) }
    mediaRecorder.onstop = onRecordingStop
    mediaRecorder.start(100)

    setOrbState('listening')
    // Safety auto-stop at 30s
    setTimeout(() => { if (orbState === 'listening') stopRecording() }, 30000)

  } catch {
    showHint('Microphone access denied — use Text mode below.')
  }
}

function stopRecording() {
  if (orbState !== 'listening' || !mediaRecorder) return
  stopAmplitudeViz()
  mediaRecorder.stop()
  mediaRecorder.stream.getTracks().forEach(t => t.stop())
  micAudioCtx?.close()
  setOrbState('processing')
}

async function onRecordingStop() {
  const blob = new Blob(audioChunks, { type: audioChunks[0]?.type || 'audio/webm' })
  try {
    // Decode → resample to 16 kHz mono float32 for Whisper
    const ab      = await blob.arrayBuffer()
    const decCtx  = new AudioContext()
    const decoded = await decCtx.decodeAudioData(ab)
    await decCtx.close()

    const targetHz = 16000
    const offCtx   = new OfflineAudioContext(1, Math.ceil(decoded.duration * targetHz), targetHz)
    const src      = offCtx.createBufferSource()
    src.buffer     = decoded
    src.connect(offCtx.destination)
    src.start(0)
    const pcm = (await offCtx.startRendering()).getChannelData(0)

    const resp    = await fetch('/transcribe', {
      method:  'POST',
      headers: { 'Content-Type': 'application/octet-stream' },
      body:    pcm.buffer,
    })
    const { text, error } = await resp.json()
    if (error) throw new Error(error)

    if (text?.trim()) {
      await sendMessage(text.trim())
    } else {
      showHint("Didn't catch that — try again or use Text mode.")
      setOrbState('idle')
    }
  } catch (err) {
    showHint('Voice error: ' + err.message)
    setOrbState('idle')
  }
}

/* ─── Real-time amplitude → orb scale ─────────────────────── */
function startAmplitudeViz() {
  const buf = new Uint8Array(analyserNode.frequencyBinCount)
  function frame() {
    vizFrameId = requestAnimationFrame(frame)
    analyserNode.getByteTimeDomainData(buf)
    let sum = 0
    for (let i = 0; i < buf.length; i++) { const v = (buf[i] / 128) - 1; sum += v * v }
    const amp   = Math.min(1, Math.sqrt(sum / buf.length) * 10)
    const scale = 1 + amp * 0.28
    const glow  = 50  + amp * 60
    const alpha = .22 + amp * .50
    orb.style.transform = `scale(${scale.toFixed(3)})`
    orb.style.boxShadow =
      `0 0 ${glow}px rgba(34,211,167,${alpha.toFixed(2)}),` +
      `0 0 ${glow * 1.8}px rgba(34,211,167,${(alpha * .38).toFixed(2)})`
  }
  frame()
}

function stopAmplitudeViz() {
  if (vizFrameId) cancelAnimationFrame(vizFrameId)
  vizFrameId = null
}

/* ─── Transient hint text ──────────────────────────────────── */
let hintTimer = null
function showHint(msg) {
  responseText.textContent = msg
  clearTimeout(hintTimer)
  hintTimer = setTimeout(() => { responseText.textContent = '' }, 4000)
}

/* ─── Reset ────────────────────────────────────────────────── */
async function resetSession() {
  window.speechSynthesis?.cancel()
  stopAmplitudeViz()
  if (mediaRecorder && orbState === 'listening') {
    mediaRecorder.stop()
    mediaRecorder.stream.getTracks().forEach(t => t.stop())
  }
  await fetch('/reset', { method: 'POST' })
  responseText.textContent = ''
  userLabel.textContent    = ''
  userLabel.classList.remove('show')
  document.getElementById('panel-fields').innerHTML   = ''
  document.getElementById('panel-concerns').innerHTML = ''
  document.getElementById('panel-step').textContent   = '◎ Scene Size-up'
  document.getElementById('panel-step').style.color   = '#d29922'
  setOrbState('idle')
}

/* ─── Utilities ────────────────────────────────────────────── */
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

/* ─── Event listeners ──────────────────────────────────────── */

// Orb tap: speak / stop / interrupt
orbWrap.addEventListener('click', () => {
  if (textMode) return
  if      (orbState === 'idle')       startRecording()
  else if (orbState === 'listening')  stopRecording()
  else if (orbState === 'speaking')   { window.speechSynthesis?.cancel(); setOrbState('idle') }
  else if (orbState === 'processing') {
    // Tap to cancel a hung request
    isSending = false
    setOrbState('idle')
    responseText.textContent = ''
  }
})

// Keyboard / text mode toggle
document.getElementById('keyboard-btn').addEventListener('click', () => {
  textMode = !textMode
  document.getElementById('keyboard-btn').classList.toggle('active', textMode)
  textModeArea.classList.toggle('open', textMode)
  if (textMode) {
    textInput.focus()
    if (orbState === 'listening') stopRecording()
  }
})

// Text mode send
document.getElementById('send-btn').addEventListener('click', () => {
  const v = textInput.value.trim()
  if (!v) return
  textInput.value = ''
  sendMessage(v)
})
textInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return
  e.preventDefault()
  const v = textInput.value.trim()
  if (!v) return
  textInput.value = ''
  sendMessage(v)
})

// Assessment panel toggle
document.getElementById('assessment-btn').addEventListener('click', () => {
  document.getElementById('patient-panel').classList.toggle('open')
  document.getElementById('assessment-btn').classList.toggle('active',
    document.getElementById('patient-panel').classList.contains('open'))
})

// Audio/TTS toggle
document.getElementById('audio-btn').addEventListener('click', () => {
  ttsOn = !ttsOn
  const btn = document.getElementById('audio-btn')
  btn.textContent = ttsOn ? '🔊 On' : '🔇 Off'
  btn.classList.toggle('active', ttsOn)
  if (!ttsOn && orbState === 'speaking') {
    window.speechSynthesis?.cancel()
    setOrbState('idle')
  }
})

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Start a new patient assessment?')) resetSession()
})

// Close assessment panel when clicking outside
document.addEventListener('click', e => {
  const panel = document.getElementById('patient-panel')
  const btn   = document.getElementById('assessment-btn')
  if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open')
    btn.classList.remove('active')
  }
})

// Pre-warm TTS voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices()
  window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices())
}

// Bootstrap patient state
fetch('/patient-state').then(r => r.json()).then(updateAssessmentPanel).catch(() => {})
</script>
